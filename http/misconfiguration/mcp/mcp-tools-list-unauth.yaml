id: mcp-tools-list-unauth

info:
  name: MCP Server - Unauthenticated Tools List Exposure
  author: razasharif
  severity: medium
  description: |
    Detects Model Context Protocol (MCP) servers that expose their tools/list
    method without authentication. This allows attackers to enumerate all
    available tools (function handlers) exposed by the server, which can be
    used to plan further attacks. MCP servers should require authentication
    before disclosing tool definitions.
  reference:
    - https://modelcontextprotocol.io/specification/2025-06-18/basic/authorization
    - https://cheatsheetseries.owasp.org/cheatsheets/MCP_Security_Cheat_Sheet.html
    - https://owasp.org/www-project-mcp-top-10/
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N
    cvss-score: 5.3
    cwe-id: CWE-306
  metadata:
    max-request: 1
  tags: mcp,exposure,unauth,misconfig

http:
  - method: POST
    path:
      - "{{BaseURL}}/mcp"
      - "{{BaseURL}}/mcp/v1"
      - "{{BaseURL}}/"
    headers:
      Content-Type: application/json
      Accept: "application/json, text/event-stream"
    body: |
      {"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '"jsonrpc":"2.0"'
          - '"tools"'
        condition: and
      - type: word
        part: body
        words:
          - '"name"'
          - '"description"'
        condition: and
      - type: word
        part: body
        words:
          - '"error"'
          - '"code":-32600'
          - '"code":-32001'
          - '"code":-32002'
          - 'unauthorized'
          - 'Unauthorized'
        condition: or
        negative: true
      - type: status
        status:
          - 200
    extractors:
      - type: json
        name: tool_names
        part: body
        json:
          - ".result.tools[].name"
